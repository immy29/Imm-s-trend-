<h1>Will you be mine... and let me love you forever ? imm 🩷</h1>

<button id="yes">Yes</button>
<button id="no">No</button>

<style>
body {
  background: pink;
  text-align: center;
  margin-top: 100px;
  font-family: Arial;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
}

#yes {
  background: green;
  color: white;
}

#no {
  background: red;
  color: white;
  position: absolute;
}
</style>

<script>
document.getElementById("yes").onclick = function() {
  alert("❤️ وافقت!");
};

document.getElementById("no").onmouseover = function() {
  this.style.position = "absolute";
  this.style.top = Math.random() * window.innerHeight + "px";
  this.style.left = Math.random() * window.innerWidth + "px";
};
</script>
